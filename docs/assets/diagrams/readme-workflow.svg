<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">datasheet2spice workflow preview</title>
  <desc id="desc">A workflow from datasheet PDF evidence to extracted parameters, SPICE emitters, simulator benchmarks, and validation reports.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef4f8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#244052" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#3f6b7d"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="#f5f7fa"/>
  <text x="54" y="58" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="700" fill="#17202a">Traceable datasheet-to-SPICE model generation</text>
  <text x="54" y="88" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" fill="#51616d">Extract evidence, emit reviewable models, and benchmark convergence before trusting transient results.</text>

  <g filter="url(#shadow)">
    <rect x="54" y="126" width="210" height="230" rx="10" fill="url(#panel)" stroke="#c9d6df"/>
    <rect x="84" y="156" width="150" height="170" rx="4" fill="#ffffff" stroke="#c5d1da"/>
    <line x1="104" y1="190" x2="214" y2="190" stroke="#8091a0" stroke-width="4"/>
    <line x1="104" y1="218" x2="194" y2="218" stroke="#8091a0" stroke-width="4"/>
    <line x1="104" y1="246" x2="224" y2="246" stroke="#8091a0" stroke-width="4"/>
    <path d="M104 292 C124 252, 154 274, 174 238 S214 206,224 184" fill="none" stroke="#d4554a" stroke-width="5"/>
    <text x="84" y="382" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#17202a">Datasheet PDF</text>
    <text x="84" y="407" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#51616d">tables, curves, screenshots</text>
  </g>

  <path d="M286 236 H372" stroke="#3f6b7d" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="394" y="126" width="250" height="230" rx="10" fill="#ffffff" stroke="#c9d6df"/>
    <text x="426" y="168" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#17202a">Auditable Project JSON</text>
    <rect x="426" y="195" width="178" height="24" rx="12" fill="#e8f5ef" stroke="#b8dccb"/>
    <text x="444" y="212" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#145a32">ratings.vrrm_v = 650 V</text>
    <rect x="426" y="231" width="170" height="24" rx="12" fill="#eef3ff" stroke="#c7d7fb"/>
    <text x="444" y="248" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#173f7a">Cj0 = 120 pF</text>
    <rect x="426" y="267" width="190" height="24" rx="12" fill="#fff3e9" stroke="#edc6a6"/>
    <text x="444" y="284" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#7a4217">Qrr / trr / Irrm</text>
    <text x="426" y="326" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#51616d">Every value can keep source, page,</text>
    <text x="426" y="346" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#51616d">method, confidence, and review state.</text>
  </g>

  <path d="M666 236 H752" stroke="#3f6b7d" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="774" y="126" width="160" height="230" rx="10" fill="#ffffff" stroke="#c9d6df"/>
    <text x="808" y="166" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#17202a">Emitters</text>
    <text x="802" y="205" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#51616d">VDMOS</text>
    <text x="802" y="231" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#51616d">ABM MOSFET</text>
    <text x="802" y="257" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#51616d">Diode D model</text>
    <text x="802" y="283" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" fill="#51616d">Diode ABM</text>
    <rect x="802" y="310" width="96" height="26" rx="13" fill="#eaf7fb" stroke="#b9dce7"/>
    <text x="820" y="328" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#285e6d">7 dialects</text>
  </g>

  <path d="M956 236 H1020" stroke="#3f6b7d" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="1040" y="126" width="106" height="230" rx="10" fill="#ffffff" stroke="#c9d6df"/>
    <circle cx="1093" cy="188" r="34" fill="#e8f5ef" stroke="#8dc5a8" stroke-width="3"/>
    <path d="M1076 188 L1088 201 L1113 174" fill="none" stroke="#207a47" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1062" y="252" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#17202a">Validate</text>
    <text x="1063" y="282" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#51616d">score-case</text>
    <text x="1063" y="306" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#51616d">benchmark</text>
  </g>

  <g>
    <rect x="54" y="432" width="1092" height="44" rx="8" fill="#17202a"/>
    <text x="84" y="460" font-family="Consolas,Menlo,monospace" font-size="15" fill="#dff7ff">datasheet2spice benchmark-model device.json --model diode-abm-dynamic --dialect ltspice --run-ltspice</text>
  </g>
</svg>
