<svg xmlns="http://www.w3.org/2000/svg" width="960" height="330" viewBox="0 0 960 330" role="img" aria-label="series datasheet extraction flow">
  <style>
    .box { fill: #ffffff; stroke: #8da2b8; stroke-width: 1.5; rx: 8; }
    .warn { fill: #fff8ec; stroke: #c67a00; stroke-width: 1.5; rx: 8; }
    .ok { fill: #f0fbf7; stroke: #2d9b72; stroke-width: 1.5; rx: 8; }
    .text { font: 15px Arial, sans-serif; fill: #17202a; }
    .small { font: 12px Arial, sans-serif; fill: #4e5d6c; }
    .arrow { stroke: #52677d; stroke-width: 2; marker-end: url(#arrow); fill: none; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#52677d"/>
    </marker>
  </defs>
  <rect x="34" y="54" width="160" height="74" class="box"/>
  <text x="58" y="84" class="text">PDF Upload</text>
  <text x="58" y="108" class="small">Maybe generic filename</text>

  <rect x="252" y="54" width="170" height="74" class="box"/>
  <text x="276" y="84" class="text">Detect Series</text>
  <text x="276" y="108" class="small">Header columns and text</text>

  <rect x="480" y="30" width="180" height="74" class="ok"/>
  <text x="506" y="60" class="text">Filename Match</text>
  <text x="506" y="84" class="small">Select default part</text>

  <rect x="480" y="150" width="180" height="74" class="warn"/>
  <text x="506" y="180" class="text">No Default Part</text>
  <text x="506" y="204" class="small">User must choose or export all</text>

  <rect x="728" y="54" width="190" height="74" class="ok"/>
  <text x="752" y="84" class="text">Build Projects</text>
  <text x="752" y="108" class="small">One model or all variants</text>

  <rect x="728" y="186" width="190" height="74" class="box"/>
  <text x="752" y="216" class="text">Review Evidence</text>
  <text x="752" y="240" class="small">JSON, findings, screenshots</text>

  <path d="M194 91 L252 91" class="arrow"/>
  <path d="M422 91 C446 91 456 67 480 67" class="arrow"/>
  <path d="M422 91 C446 91 456 187 480 187" class="arrow"/>
  <path d="M660 67 C692 67 700 91 728 91" class="arrow"/>
  <path d="M660 187 C692 187 700 128 728 112" class="arrow"/>
  <path d="M823 128 L823 186" class="arrow"/>
</svg>
